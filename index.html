// \u2500\u2500\u2500 계산 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// JDN(율리우스 통일날수) \u2014 Date 객체 없이 순수 정수 계산, 타임존/DST 오차 Zero
// 검증: 2000-01-01=\u620a\u5348, 2026-04-01=\u4e59\u5df3, 2026-04-20=\u7532\u5b50 (플러스만세력 실측)
function jdn(y,m,d){
  const a=Math.floor((14-m)/12),yy=y+4800-a,mm=m+12*a-3;
  return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
}
const JDN_REF=jdn(1900,1,1); // 2415021

// === 음력 \u2194 양력 변환 (Meeus 천문계산, KST 기준) ===
function calcNewMoonKST(k){
  const T=k/1236.85,T2=T*T;
  var jde=2451550.09766+29.530588861*k+0.00015437*T2;
  const M=((2.5534+29.10535670*k)%360)*Math.PI/180;
  const Mp=((201.5643+385.81693528*k)%360)*Math.PI/180;
  const F=((160.7108+390.67050284*k)%360)*Math.PI/180;
  jde+=-0.40720*Math.sin(Mp)+0.17241*Math.sin(M)+0.01608*Math.sin(2*Mp)
    +0.01039*Math.sin(2*F)+0.00739*Math.sin(Mp-M)-0.00514*Math.sin(Mp+M)
    +0.00208*Math.sin(2*M)-0.00111*Math.sin(Mp-2*F)-0.00057*Math.sin(Mp+2*F)
    +0.00056*Math.sin(2*Mp+M)-0.00042*Math.sin(3*Mp)+0.00042*Math.sin(M+2*F)
    +0.00038*Math.sin(M-2*F)-0.00024*Math.sin(2*Mp-M);
  return Math.floor(jde+0.5+9/24); // KST +9h 기준 정수 JDN
}
function jdnToDate(n){
  const l=n+68569,q=Math.floor(4*l/146097);
  const l2=l-Math.floor((146097*q+3)/4);
  const i=Math.floor(4000*(l2+1)/1461001),l3=l2-Math.floor(1461*i/4)+31;
  const j=Math.floor(80*l3/2447),d=l3-Math.floor(2447*j/80);
  const l4=Math.floor(j/11),m=j+2-12*l4,y=100*(q-49)+i+l4;
  return[y,m,d];
}
// 음력 새해(설날) JDN: 양력 1/20~2/22 사이 새달
function findLunarNewYearJDN(ly){
  const s=jdn(ly+1,1,20),e=jdn(ly+1,2,22);
  const k0=Math.round((s-2451550.09766)/29.530588861);
  for(var dk=-2;dk<=3;dk++){const nm=calcNewMoonKST(k0+dk);if(nm>=s&&nm<=e)return nm;}
  return calcNewMoonKST(k0);
}
// 음력 \u2192 양력 변환 (윤달 미포함 근사)
function lunarToSolar(ly,lm,ld,isLeap=false){
  const nyJDN=findLunarNewYearJDN(ly);
  const k0=Math.round((nyJDN-2451550.09766)/29.530588861);
  const k=k0+lm-1+(isLeap?1:0);
  return jdnToDate(calcNewMoonKST(k)+ld-1);
}

function jDateJDN(yr,idx){
  const m=JJEOLGI[idx][0],d=JJEOLGI[idx][1];
  const adj=yr%4===0?-1:yr%4===3?1:0;
  return jdn(yr,m,Math.max(1,d+adj));
}

// 연주+월주 통합 계산 (입춘 기준 연주 + 절기 기준 월주)
// 검증: 플러스만세력 2026년 4월 전체, 입춘 경계(2026-02-03/04) 완벽 일치
function calcYM(y,m,d){
  const jd=jDateJDN(y,m-1), bd=jdn(y,m,d);
  var eM=m,eY=y,jeolgiJDN=jd;
  if(bd<jd){
    eM=m-1;if(eM===0){eM=12;eY=y-1;}
    jeolgiJDN=jDateJDN(eY,eM-1);
  }
  // \u4e11\u6708(eM=1) = 아직 입춘 전 \u2192 연주는 전년도
  const yf=(eM===1)?eY-1:eY;
  const ysi=((yf-4)%10+10)%10;
  const ybi=((yf-4)%12+12)%12;
  // 월주 천간: \u5bc5\u6708(eM=2) 기준 오호둔(\u4e94\u864e\u9041)
  const off=((eM-2)%12+12)%12;
  const msi=(MTH_BASE[ysi%5]+off)%10;
  const mbi=MONTH_BI[eM-1];
  const daysSinceJeolgi=bd-jeolgiJDN; // 입절기 이후 며칠
  return{yP:{si:ysi,bi:ybi},mP:{si:msi,bi:mbi},daysSinceJeolgi};
}

// 사령(\u53f8\u4ee4) 표 - 월지별 [천간si, 일수] 순서 (여기\u2192중기\u2192본기)

  [[8,10],[9,20]],          // \u5b50: \u58ec10, \u767820

  [[1,9],[9,3],[4,18]],     // \u8fb0: \u4e599, \u76783, \u620a18
  [[4,5],[6,9],[2,16]],     // \u5df3: \u620a5, \u5e9a9, \u4e1916
  [[2,10],[5,9],[3,11]],    // \u5348: \u4e1910, \u5df19, \u4e0111
  [[3,9],[1,3],[5,18]],     // \u672a: \u4e019, \u4e593, \u5df118
  [[4,7],[8,3],[6,20]],     // \u7533: \u620a7, \u58ec3, \u5e9a20
  [[6,10],[7,20]],          // \u9149: \u5e9a10, \u8f9b20
  [[7,9],[3,3],[4,18]],     // \u620c: \u8f9b9, \u4e013, \u620a18
  [[4,7],[0,5],[8,18]],     // \u4ea5: \u620a7, \u75325, \u58ec18
];

function findSaryeong(mBi,days){
  const tbl=SARYEONG_TABLE[mBi];
  var acc=0;
  for(var _foi53=0;_foi53<tbl.length;_foi53++){const si=tbl[_foi53][0],d=tbl[_foi53][1];
    acc+=d;
    if(days<acc)return{si:si,phase:tbl.findIndex(x=>x[0]===si)===0?'초기':tbl.findIndex(x=>x[0]===si)===tbl.length-1?'본기':'중기'};
  }
  return{si:tbl[tbl.length-1][0],phase:'본기'};
}

// 일주: JDN 기반, offset=10 (플러스만세력 2026년 4월 실측 검증)
function dayP(y,m,d){
  const n=jdn(y,m,d)-JDN_REF;
  const c=((n+10)%60+60)%60;
  return{si:c%10,bi:c%12};
}

// 시주: 오자둔(\u4e94\u5b50\u9041) - 일간 기준
// 시주 계산 - 30분 경계: 23:30부터 자시 시작
function hourP(h,m,dsi){
  // 총 분 \u2192 23:30 기준으로 이동 \u2192 120분(2시간)씩 끊기
  const totalM=h*60+(m||0);
  const adjM=(totalM-23*60-30+24*60)%(24*60);
  const bi=Math.floor(adjM/120)%12;
  return{si:([0,2,4,6,8][dsi%5]+bi)%10,bi:bi};
}

// 대운 계산
function calcDW(mP,fwd,bY,bM,bD){
  const idx=BI_JG[mP.bi];var yr=bY;
  if(idx===11&&bM<=1)yr=bY-1;
  const ni=(idx+1)%12,ny=ni===0?yr+1:yr;
  const bd=jdn(bY,bM,bD);
  const days=Math.max(0,Math.round(
    fwd?jDateJDN(ny,ni)-bd:bd-jDateJDN(yr,idx)
  ));
  const sAge=Math.floor(days/3),sMo=Math.floor(((days%3)/3)*12);
  var b=0;for(var i=0;i<60;i++)if(i%10===mP.si&&i%12===mP.bi){b=i;break;}
  return{startAge:sAge,startMonths:sMo,
    daeW:Array.from({length:10},(_,i)=>{
      const n=fwd?(b+i+1)%60:((b-i-1)%60+60)%60;
      return{si:n%10,bi:n%12,age:sAge+i*10,year:bY+sAge+i*10};
    })};
}

// 십이운성: 일간(dm) 기준 각 지지에서의 위치
function oonsung(dm,bi){
  var c=JS_BR[dm],p=0;
  while(c!==bi&&p<12){c=((c+DIR[dm])%12+12)%12;p++;}
  return OS_NM[p];
}

// 십신
function sipsin(dm,ti){
  if(dm===ti)return'비견';
  const dE=SEL[dm],tE=SEL[ti],sy=SYN[dm]===SYN[ti];
  if(dE===tE)return sy?'비견':'겁재';
  if(GEN[dE]===tE)return sy?'식신':'상관';
  if(CON[dE]===tE)return sy?'편재':'정재';
  if(GEN[tE]===dE)return sy?'편인':'정인';
  if(CON[tE]===dE)return sy?'편관':'정관';
  return'-';
}

const stFW=si=>SYN[si]===0?950:300;  // 양간 극굵, 음간 가늘게
const brFW=bi=>BYN[bi]===0?950:300;

// 신강약 + 용신 분석 (정밀화)
// - 십이운성 강도 반영
// - 삼합\u00b7방합 완성 반영
// - 천간합 처리 (합거\u00b7화기)
// - 격국 혼잡 판별
// - 지장간 투간 통근 정확화
function analyzeAll(yP,mP,dP,hP,dm,daysSinceJeolgi=15){
  const dmE=SEL[dm];
  const helpEls=new Set([dmE,GEN_BY[dmE]]);
  const stems=[yP.si,mP.si,dP.si,hP.si];
  const branches=[yP.bi,mP.bi,dP.bi,hP.bi];

  // \u2500\u2500 십이운성 강도 점수 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  // 제왕/건록이 가장 강, 절/사/묘가 가장 약
  const OS_STR={장생:4,목욕:-1,관대:3,건록:6,제왕:7,쇠:-2,병:-3,사:-5,묘:-5,절:-6,태:-1,양:1};

  // \u2500\u2500 삼합\u00b7방합 완성 체크 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  // 완성 삼합: 3지지 모두 있을 때 해당 오행으로 합화
  // 반합(2개): 월지 포함 시 세력 강화
  const samhapEl=[];  // 완성 삼합 오행
  const samhap2El=[]; // 반합(2개) 오행
  SAM_HAP.forEach((samItem)=>{const grp=samItem[0],el=samItem[1];
    const cnt=grp.filter(b=>branches.includes(b)).length;
    if(cnt===3)samhapEl.push(el);
    else if(cnt===2&&grp.includes(mP.bi))samhap2El.push(el); // 월지 포함 반합
  });
  const banghapEl=[];
  BANG_HAP.forEach((bangItem)=>{const grp=bangItem[0],el=bangItem[1];
    const cnt=grp.filter(b=>branches.includes(b)).length;
    if(cnt===3)banghapEl.push(el);
  });
  // 합화된 오행 (월지 포함 삼합/방합은 월지 오행 변화)
  const combinedEls=new Set(samhapEl.concat(banghapEl));

  // \u2500\u2500 천간합 처리 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  // \u7532\u5df1토, \u4e59\u5e9a금, \u4e19\u8f9b수, \u4e01\u58ec목, \u620a\u7678화
  // 합이 성립하면 해당 천간 오행 영향 감소 (합거)
  // 합화: 월지 득령이면 합화 오행으로 변환
  const hapPairs=[];
  STEM_HAP.forEach((pair3)=>{const a=pair3[0][0],b=pair3[0][1],hapEl=pair3[1];
    if(stems.includes(a)&&stems.includes(b)){
      hapPairs.push({a,b,hapEl});
    }
  });
  // 합된 천간 set
  const hapStems=new Set(hapPairs.reduce((acc,h)=>{acc.push(h.a);acc.push(h.b);return acc;},[])  );
  // 일간이 합이 되는 경우
  const 일간합 = STEM_HAP.some((ph)=>{const a=ph[0][0],b=ph[0][1];return (a===dm||b===dm)&&stems.includes(a===dm?b:a);});

  // \u2500\u2500 지지충 처리 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  // 충이 있으면 해당 지지의 힘 절반으로
  const chungedBr=new Set();
  B_CHUNG.forEach((chunItem)=>{const a=chunItem[0],b=chunItem[1];
    if(branches.includes(a)&&branches.includes(b)){chungedBr.add(a);chungedBr.add(b);}
  });

  // \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501 \u2460 신강약 점수제 (십이운성 통합) \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
  var score=0;
  const mBiEl=BEL[mP.bi],dBiEl=BEL[dP.bi];

  // 실질 월지 오행 (삼합/방합 완성 시 오행 변화)
  const actualMBiEl=samhapEl.length>0?samhapEl[0]:banghapEl.length>0?banghapEl[0]:mBiEl;
  const actualMBiIsHelper=helpEls.has(actualMBiEl);

  // 월지 \u2014 사령 기반 + 십이운성 통합
  const mOs=oonsung(dm,mP.bi);
  const mOsScore=OS_STR[mOs]||0;
  // 아군 오행이면 운성도 양수, 적군이면 운성도 음수로 적용
  if(actualMBiEl===dmE){score+=28+(mOsScore>0?mOsScore:0);}       // 건록/왕지
  else if(actualMBiEl===GEN_BY[dmE]){score+=22+(mOsScore>0?mOsScore:0);} // 인성
  else if(actualMBiEl===GEN[dmE]){score+=Math.min(-12,mOsScore*2);}       // 식상
  else if(actualMBiEl===CON[dmE]){score+=Math.min(-10,mOsScore*2);}       // 재성
  else if(actualMBiEl===CON_BY[dmE]){score+=Math.min(-15,mOsScore*2);}    // 관살

  // 일지 \u2014 십이운성 직접 반영
  const dOs=oonsung(dm,dP.bi);
  const dOsScore=OS_STR[dOs]||0;
  // 일지는 배우자 궁이자 일간 뿌리 \u2014 운성이 핵심
  if(dBiEl===dmE||dBiEl===GEN_BY[dmE]){
    score+=8+Math.max(0,dOsScore*1.5); // 아군이면 운성 보너스
  } else {
    score+=dOsScore-3; // 적군이면 운성 패널티
  }
  // 충된 일지는 약화
  if(chungedBr.has(dP.bi))score-=5;

  // 연지\u00b7시지 \u2014 십이운성 경량 반영
  [yP.bi,hP.bi].forEach(b=>{
    const el=BEL[b];
    const os=oonsung(dm,b);
    const osS=OS_STR[os]||0;
    const chungPenalty=chungedBr.has(b)?-3:0;
    if(el===dmE)score+=7+Math.max(0,osS)+chungPenalty;
    else if(el===GEN_BY[dmE])score+=6+Math.max(0,osS)+chungPenalty;
    else if(el===GEN[dmE])score+=Math.min(-2,osS*0.5)+chungPenalty;
    else if(el===CON[dmE])score+=Math.min(-2,osS*0.5)+chungPenalty;
    else if(el===CON_BY[dmE])score+=Math.min(-3,osS)+chungPenalty;
  });

  // 천간 (연\u00b7월\u00b7시) \u2014 합된 천간은 힘 절반
  [yP.si,mP.si,hP.si].forEach(s=>{
    const el=SEL[s];
    const hapFactor=hapStems.has(s)?0.5:1; // 합된 천간은 절반
    // 통근 여부 체크 (천간 오행이 지지에 뿌리 있는지)
    const hasRoot=branches.some(b=>BEL[b]===el||JJG[b].some(js=>SEL[js]===el));
    const rootBonus=hasRoot?2:0;
    if(el===dmE)score+=(7+rootBonus)*hapFactor;
    else if(el===GEN_BY[dmE])score+=(7+rootBonus)*hapFactor;
    else if(el===GEN[dmE])score+=(-4-rootBonus)*hapFactor;
    else if(el===CON[dmE])score+=(-4-rootBonus)*hapFactor;
    else if(el===CON_BY[dmE])score+=(-5-rootBonus)*hapFactor;
  });

  // 지장간 여기/중기 (본기 제외) \u2014 경량 반영
  branches.forEach(b=>{
    const jjgs=JJG[b];
    if(jjgs.length<2)return;
    const chungF=chungedBr.has(b)?0.5:1;
    for(var i=0;i<jjgs.length-1;i++){
      const el=SEL[jjgs[i]];
      if(el===dmE)score+=2*chungF;
      else if(el===GEN_BY[dmE])score+=2*chungF;
      else if(el===CON_BY[dmE])score-=1*chungF;
    }
  });

  // 삼합/방합 완성 보정
  samhapEl.forEach(el=>{
    if(el===dmE||el===GEN_BY[dmE])score+=12;
    else if(el===CON_BY[dmE])score-=10;
    else if(el===CON[dmE])score-=7;
    else if(el===GEN[dmE])score-=5;
  });
  banghapEl.forEach(el=>{
    if(el===dmE||el===GEN_BY[dmE])score+=8;
    else if(el===CON_BY[dmE])score-=8;
  });
  samhap2El.forEach(el=>{ // 월지 포함 반합
    if(el===dmE||el===GEN_BY[dmE])score+=4;
    else if(el===CON_BY[dmE])score-=4;
  });

  // 일간합 \u2014 일간이 합되면 힘 약화
  if(일간합)score-=5;

  // 판정
  var sg=score>=0?'신강':'신약';
  var sgGrade=score>=25?'신강':score>=5?'중강':score>=-5?'중화':score>=-25?'중약':'신약';

  // 득령/득지/득세 (UI용)
  const dR=helpEls.has(actualMBiEl);
  const dJ=helpEls.has(dBiEl)||(OS_STR[dOs]||0)>=5; // 제왕/건록이면 득지
  var hc=1;
  [yP.si,mP.si,hP.si].forEach(s=>{if(helpEls.has(SEL[s]))hc++;});
  [yP.bi,hP.bi].forEach(b=>{if(helpEls.has(BEL[b]))hc++;});
  const dS=hc>=3;

  // \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501 \u2461 격국 \u2014 투간 우선 + 혼잡 판별 \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
  const YANGIN={0:3,2:6,4:6,6:9,8:0};
  const NOKJI={0:2,1:3,2:5,3:6,4:5,5:6,6:8,7:9,8:11,9:0};
  var gy,gyB,geokSi,tuganSi=null;
  const mJjg=JJG[mP.bi];
  const bonkiSi=mJjg[mJjg.length-1];
  const isYangGan=SYN[dm]===0;

  if(isYangGan&&YANGIN[dm]===mP.bi){
    gy='양인격';gyB='겁재';geokSi=bonkiSi;score+=5;
  } else if(isYangGan&&NOKJI[dm]===mP.bi){
    gy='건록격';gyB='비견';geokSi=bonkiSi;score+=3;
  } else if(!isYangGan&&NOKJI[dm]===mP.bi){
    gy='전록격';gyB='비견';geokSi=bonkiSi;score+=3;
  } else if(mBiEl===dmE){
    gy='비견격';gyB='비견';geokSi=bonkiSi;
  } else {
    const findTugan=(targetSi)=>{
      // 정확 일치 우선, 그 다음 오행 일치
      if(stems.includes(targetSi))return targetSi;
      const targetEl=SEL[targetSi];
      return stems.find(s=>SEL[s]===targetEl&&!hapStems.has(s))||// 합되지 않은 천간
             stems.find(s=>SEL[s]===targetEl)||null;
    };
    var t=findTugan(bonkiSi);
    if(t!==null){geokSi=bonkiSi;tuganSi=t;}
    else if(mJjg.length>=2){
      const jungSi=mJjg[mJjg.length-2];
      t=findTugan(jungSi);
      if(t!==null){geokSi=jungSi;tuganSi=t;}
    }
    if(geokSi===undefined&&mJjg.length>=3){
      t=findTugan(mJjg[0]);
      if(t!==null){geokSi=mJjg[0];tuganSi=t;}
    }
    if(geokSi===undefined)geokSi=bonkiSi;
    const judgeSi=tuganSi!==null?tuganSi:geokSi;
    const ss=sipsin(dm,judgeSi);
    gyB=ss;
    const gM={비견:'건록격',겁재:'양인격',식신:'식신격',상관:'상관격',
      편재:'편재격',정재:'정재격',편관:'편관격',정관:'정관격',
      편인:'편인격',정인:'정인격'};
    gy=gM[ss]||'기타격';
  }

  // \u683c\u5c40 혼잡 판별
  const stemSsAll=stems.map(s=>sipsin(dm,s));
  const 관살혼잡=stemSsAll.includes('정관')&&stemSsAll.includes('편관');
  const 재성혼잡=(stemSsAll.includes('정재')&&stemSsAll.includes('편재'))&&sg==='신약';
  const 인성혼잡=stemSsAll.includes('정인')&&stemSsAll.includes('편인');
  const 식상혼잡=stemSsAll.includes('식신')&&stemSsAll.includes('상관');

  // 판정 갱신
  sg=score>=0?'신강':'신약';
  sgGrade=score>=25?'신강':score>=5?'중강':score>=-5?'중화':score>=-25?'중약':'신약';

  // \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501 \u2462 사령 (입절 일수 기반) \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
  const saryeongRes=findSaryeong(mP.bi,daysSinceJeolgi);
  const saLyeong=saryeongRes.si;
  const saLyeongEl=SEL[saLyeong];
  const saLyeongPhase=saryeongRes.phase;
  const tuChul=mJjg.filter(s=>stems.includes(s));

  // \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501 \u2463 격국별 용신 (자평진전) \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
  const food=GEN[dmE],wealth=CON[dmE],off2=GEN_BY[dmE],kill=CON_BY[dmE];
  var ys;
  // 관살혼잡이면 식신제살 or 합살 처리 우선
  if(관살혼잡){
    ys=sg==='신강'
      ?{yong:food,hee:wealth,gi:kill,gu:dmE,han:off2} // 식신제살
      :{yong:off2,hee:dmE,gi:wealth,gu:kill,han:food};
  } else if(gyB==='비견'||gyB==='겁재'){
    ys=sg==='신강'
      ?{yong:kill,hee:wealth,gi:dmE,gu:off2,han:food}
      :{yong:off2,hee:dmE,gi:food,gu:wealth,han:kill};
  } else if(gyB==='식신'||gyB==='상관'){
    ys=sg==='신강'
      ?{yong:wealth,hee:food,gi:off2,gu:dmE,han:kill}
      :{yong:off2,hee:dmE,gi:food,gu:wealth,han:kill};
  } else if(gyB==='편재'||gyB==='정재'){
    ys=sg==='신강'
      ?{yong:kill,hee:wealth,gi:dmE,gu:off2,han:food}
      :{yong:dmE,hee:off2,gi:wealth,gu:kill,han:food};
  } else if(gyB==='정관'){
    ys=sg==='신강'
      ?{yong:wealth,hee:kill,gi:food,gu:dmE,han:off2}
      :{yong:off2,hee:dmE,gi:food,gu:wealth,han:kill};
  } else if(gyB==='편관'){
    ys=sg==='신강'
      ?{yong:food,hee:wealth,gi:off2,gu:dmE,han:kill}
      :{yong:off2,hee:dmE,gi:wealth,gu:kill,han:food};
  } else if(gyB==='편인'||gyB==='정인'){
    ys=sg==='신강'
      ?{yong:wealth,hee:food,gi:off2,gu:dmE,han:kill}
      :{yong:kill,hee:off2,gi:food,gu:dmE,han:wealth};
  } else {
    ys=sg==='신강'
      ?{yong:food,hee:wealth,gi:off2,gu:dmE,han:kill}
      :{yong:off2,hee:dmE,gi:wealth,gu:kill,han:food};
  }

  // \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501 \u2464 조후 우선 적용 \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
  const HANAN={목:0.5,화:2,토:1,금:-1,수:-2};
  const JOHAT={목:-0.5,화:2,토:1,금:-0.5,수:-2};
  var hnScore=0,jhScore=0;
  [yP,mP,dP,hP].forEach((p,idx)=>{
    const wt=idx===1?2:1;
    hnScore+=(HANAN[SEL[p.si]]||0)*wt+(HANAN[BEL[p.bi]]||0)*wt;
    jhScore+=(JOHAT[SEL[p.si]]||0)*wt+(JOHAT[BEL[p.bi]]||0)*wt;
  });
  const hnVal=Math.max(-1,Math.min(1,hnScore/20));
  const jhVal=Math.max(-1,Math.min(1,jhScore/20));
  const isExtremeHot=hnVal>0.5||jhVal<-0.5;
  const isExtremeCold=hnVal<-0.5||jhVal>0.5;
  const JOHOO_MONTH={
    0:{need:'화',reason:'\u5b50\u6708 한겨울'},1:{need:'화',reason:'\u4e11\u6708 늦겨울'},
    2:{need:'화',reason:'\u5bc5\u6708 초봄 한기'},5:{need:'수',reason:'\u5df3\u6708 초여름'},
    6:{need:'수',reason:'\u5348\u6708 한여름'},7:{need:'수',reason:'\u672a\u6708 늦여름'},
    11:{need:'화',reason:'\u4ea5\u6708 초겨울'},
  };
  var johooApplied=null;
  const monthJohoo=JOHOO_MONTH[mP.bi];
  if(monthJohoo){
    const need=monthJohoo.need;
    if(ys.yong===need){
      johooApplied={type:'정합',need,reason:monthJohoo.reason,desc:'\u683c+조후 일치 \u2192 강력한 용신'};
    } else if(ys.gi===need||ys.gu===need){
      const origYong=ys.yong;
      ys=Object.assign({},ys,{yong:need,hee:origYong});
      johooApplied={type:'충돌\u2192조후',need,reason:monthJohoo.reason,desc:'조후 우선 교체'};
    } else if(ys.hee===need){
      johooApplied={type:'희신강화',need,reason:monthJohoo.reason,desc:'\u683c+조후 병용'};
    } else {
      johooApplied={type:'참조',need,reason:monthJohoo.reason,desc:'격국 용신 우선'};
    }
  }
  if(!johooApplied&&(isExtremeHot||isExtremeCold)){
    const need=isExtremeCold?'화':'수';
    johooApplied={type:'극단보정',need,reason:isExtremeCold?'한습 극단':'난조 극단',desc:'조후 필요'};
  }

  const jinEl=new Set([ys.yong,ys.hee]);
  const jinSi=Array.from(new Set(stems.filter(s=>jinEl.has(SEL[s]))));
  const sangsinEl=GEN_BY[ys.yong];
  const sangsinSi=Array.from(new Set(stems.filter(s=>SEL[s]===sangsinEl)));
  const gashinEl=GEN_BY[ys.yong];
  const gashinSi=Array.from(new Set(stems.filter(s=>SEL[s]===gashinEl||SEL[s]===ys.hee)));

  return{sg:sg,sgGrade:sgGrade,sgScore:score,dR:dR,dJ:dJ,dS:dS,gy:gy,gyB:gyB,geokSi:geokSi,tuganSi:tuganSi,ys:ys,johooApplied:johooApplied,saLyeong:saLyeong,saLyeongEl:saLyeongEl,saLyeongPhase:saLyeongPhase,tuChul:tuChul,jinSi:jinSi,sangsinEl:sangsinEl,sangsinSi:sangsinSi,gashinSi:gashinSi,
    // 새로운 정밀 정보
    관살혼잡,재성혼잡:재성혼잡,인성혼잡:인성혼잡,식상혼잡:식상혼잡,일간합:일간합,hapPairs:hapPairs,samhapEl:samhapEl,banghapEl:banghapEl,samhap2El:samhap2El,
    chungedBr:Array.from(chungedBr),mOs:mOs,dOs:dOs, // 월지\u00b7일지 십이운성
    actualMBiEl, // 합화 후 실질 월지 오행
  };
}

// \u2500\u2500\u2500 형충회합 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function pRels(p,all){
  const r={},ot=all.filter(q=>q!==p),ob=ot.map(q=>q.bi);
